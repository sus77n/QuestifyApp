spring.application.name=QuestifyApp
server.port=4000

spring.datasource.url=jdbc:mysql://localhost:3306/questify_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.filter.dispatcher-types=REQUEST,ERROR,ASYNC

spring.security.bcrypt.strength=10

springdoc.swagger-ui.path=/swagger

springdoc.api-docs.path=/api-docs
