spring.application.name=QuestifyApp

# Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/questify_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.filter.dispatcher-types=REQUEST,ERROR,ASYNC

spring.security.bcrypt.strength=10

# Change Swagger UI path (e.g., http://localhost:8080/docs instead of /swagger-ui.html)
springdoc.swagger-ui.path=/swagger

# (Optional) Change OpenAPI JSON endpoint (e.g., /api-docs)
springdoc.api-docs.path=/api-docs
