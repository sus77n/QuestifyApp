name: Deploy Spring Boot Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Spring Boot project
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t iquiz-backend:latest .

      - name: Stop old container
        continue-on-error: true
        shell: powershell
        run: |
          docker stop iquiz-backend 2>$null
          docker rm iquiz-backend 2>$null

      - name: Run new container
        run: docker run -d --name iquiz-backend -p 8404:8404 iquiz-backend:latest