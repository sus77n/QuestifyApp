name: Deploy Spring Boot Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Spring Boot project
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t spring-backend:latest .

      - name: Stop old container
        shell: powershell
        run: |
          docker stop spring-backend 2>$null
          docker rm spring-backend 2>$null

      - name: Run new container
        run: docker run -d --name spring-backend -p 8404:8404 spring-backend:latest